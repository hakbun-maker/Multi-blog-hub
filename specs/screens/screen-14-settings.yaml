version: "2.0"

screen:
  name: 설정
  route: /settings
  layout: sidebar-main
  auth: true

data_requirements:
  - resource: users
    needs: [id, email, name]
  - resource: ai_api_keys
    needs: [id, provider, is_active, created_at]

components:
  - id: settings_nav
    type: tabs
    position: main
    function: 계정 / AI API / 외부 연동 / 알림 탭 전환

  - id: account_tab
    type: form
    position: main
    function: 프로필 편집 (이름 변경, 비밀번호 변경)
    data_source:
      resource: users
    events:
      - on: submit:profile
        do: 프로필 정보 저장
      - on: submit:password
        do: 비밀번호 변경 (Supabase Auth)

  - id: ai_api_tab
    type: form
    position: main
    function: AI API 키 입력/관리 (Claude, OpenAI, Gemini)
    data_source:
      resource: ai_api_keys
    events:
      - on: submit:add-key
        do: API 키 암호화 저장
      - on: click:delete-key
        do: API 키 삭제
      - on: click:test-key
        do: API 키 유효성 테스트 호출

  - id: external_integration_tab
    type: form
    position: main
    function: 외부 연동 설정 (Notion API, Google Sheets - 선택사항)
    events:
      - on: submit
        do: 외부 연동 설정 저장

  - id: notification_tab
    type: form
    position: main
    function: 알림 설정 (자동화 실패 알림, 이메일 알림 여부)
    events:
      - on: submit
        do: 알림 설정 저장

connections:
  external:
    - supabase_auth
    - supabase_vault (API 키 암호화)

tests:
  - name: AI API 키 저장
    when: Claude API 키 입력 후 저장
    then:
      - 키 암호화 후 저장됨
      - 마스킹된 키 표시

  - name: API 키 유효성 테스트
    when: 테스트 버튼 클릭
    then:
      - AI API 호출 성공/실패 결과 표시

  - name: 프로필 수정
    when: 이름 변경 후 저장
    then:
      - 사용자 이름 업데이트됨
      - 성공 토스트 표시
